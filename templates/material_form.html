{% extends "base.html" %}
{% block content %}

<h3 class="fw-bold mb-3">{{ "編輯物料" if material else "新增物料" }}</h3>

<div class="card p-4">
    <form method="post">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label">mID</label>
                <input class="form-control" name="mID" value="{{ material.mID if material else '' }}" required {% if material %}readonly{% endif %}>
            </div>
            <div class="col-md-4">
                <label class="form-label">物料名稱</label>
                <input class="form-control" name="m_name" value="{{ material.m_name if material else '' }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">尺寸(mm)</label>
                <input class="form-control" name="m_size" value="{{ material.m_size if material else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">店家</label>
                <input class="form-control" name="store" value="{{ material.store if material else '' }}">
            </div>

            <div class="col-md-3">
                <label class="form-label">購買日期</label>
                <input class="form-control" type="date" name="purchase_date" value="{{ material.purchase_date if material else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">批發價</label>
                <input class="form-control" type="number" name="wholesale_price" value="{{ material.wholesale_price if material else 0 }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">單價</label>
                <input class="form-control" type="number" step="0.01" name="unit_price" value="{{ material.unit_price if material else 0 }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">目前庫存</label>
                <input class="form-control" type="number" name="stock" value="{{ material.stock if material else 0 }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">安全庫存</label>
                <input class="form-control" type="number" name="safe_stock" value="{{ material.safe_stock if material else 0 }}">
            </div>
            <div class="col-md-9">
                <label class="form-label">備註</label>
                <input class="form-control" name="note" value="{{ material.note if material else '' }}">
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-success">儲存</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('materials') }}">返回</a>
        </div>
    </form>
</div>

{% endblock %}
