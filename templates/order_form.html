{% extends "base.html" %}
{% block content %}

<h3 class="fw-bold mb-3">新增訂單</h3>

<div class="card p-4">
    <form method="post" id="orderForm">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label">客戶</label>
                <select class="form-select" name="phone_number" required>
                    {% for c in customers %}
                    <option value="{{ c.phone_number }}">{{ c.name }} / {{ c.phone_number|mask_phone }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">下單日期</label>
                <input class="form-control" type="date" name="order_time">
            </div>

            <div class="col-md-3">
                <label class="form-label">狀態</label>
                <select class="form-select" name="state">
                    <option value="未出貨">未出貨</option>
                    <option value="已出貨">已出貨</option>
                    <option value="已取消">已取消</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">出貨日期</label>
                <input class="form-control" type="date" name="ship_time">
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="fw-bold mb-0">購物車商品</h5>
            <button type="button" class="btn btn-outline-success btn-sm" onclick="addCartRow()">新增一項商品</button>
        </div>

        <div class="table-responsive">
            <table class="table align-middle" id="cartTable">
                <thead>
                <tr>
                    <th style="width: 45%">商品</th>
                    <th style="width: 15%">數量</th>
                    <th style="width: 15%">庫存</th>
                    <th style="width: 15%">小計</th>
                    <th style="width: 10%">操作</th>
                </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
        </div>

        <div class="card bg-light p-3 mt-3">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="text-muted">商品種類</div>
                    <div class="fs-5 fw-bold" id="cartKinds">0</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted">總數量</div>
                    <div class="fs-5 fw-bold" id="cartQty">0</div>
                </div>
                <div class="col-md-4">
                    <div class="text-muted">總金額</div>
                    <div class="fs-5 fw-bold" id="cartTotal">NT$0</div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-success">建立訂單</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('orders') }}">返回</a>
        </div>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script>
const PRODUCTS = {{ products_json | tojson }};

function productOptionHtml(selectedKey = "") {
    return PRODUCTS.map(p => {
        const key = `${p.iID}`;
        const selected = key === selectedKey ? "selected" : "";
        return `<option value="${key}" data-price="${p.price_num}" data-stock="${p.stock_num}">
            ${p.i_name} / ${p.size} / iID ${p.iID} / NT$${p.price_num} / 庫存 ${p.stock_num}
        </option>`;
    }).join("");
}

function addCartRow(selectedKey = "", quantity = 1) {
    const tbody = document.getElementById("cartBody");
    const tr = document.createElement("tr");

    tr.innerHTML = `
        <td>
            <select class="form-select product-select" name="product_key[]" required>
                ${productOptionHtml(selectedKey)}
            </select>
        </td>
        <td>
            <input class="form-control quantity-input" type="number" name="quantity[]" min="1" value="${quantity}" required>
        </td>
        <td class="stock-cell text-muted">0</td>
        <td class="subtotal-cell fw-bold">NT$0</td>
        <td>
            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeCartRow(this)">刪除</button>
        </td>
    `;

    tbody.appendChild(tr);

    tr.querySelector(".product-select").addEventListener("change", updateCartSummary);
    tr.querySelector(".quantity-input").addEventListener("input", updateCartSummary);

    updateCartSummary();
}

function removeCartRow(button) {
    button.closest("tr").remove();
    updateCartSummary();
}

function updateCartSummary() {
    let total = 0;
    let qtyTotal = 0;
    let kinds = 0;

    document.querySelectorAll("#cartBody tr").forEach(row => {
        const select = row.querySelector(".product-select");
        const quantityInput = row.querySelector(".quantity-input");
        const option = select.options[select.selectedIndex];

        const price = Number(option.dataset.price || 0);
        const stock = Number(option.dataset.stock || 0);
        const qty = Number(quantityInput.value || 0);
        const subtotal = price * qty;

        row.querySelector(".stock-cell").textContent = stock;
        row.querySelector(".subtotal-cell").textContent = "NT$" + subtotal;

        if (qty > 0) {
            kinds += 1;
            qtyTotal += qty;
            total += subtotal;
        }

        if (qty > stock) {
            quantityInput.classList.add("is-invalid");
        } else {
            quantityInput.classList.remove("is-invalid");
        }
    });

    document.getElementById("cartKinds").textContent = kinds;
    document.getElementById("cartQty").textContent = qtyTotal;
    document.getElementById("cartTotal").textContent = "NT$" + total;
}

document.addEventListener("DOMContentLoaded", function () {
    addCartRow();
});
</script>
{% endblock %}
