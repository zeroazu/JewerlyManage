{% extends "base.html" %}
{% block content %}

<h3 class="fw-bold mb-3">{{ "編輯客戶" if customer else "新增客戶" }}</h3>

<div class="card p-4">
    <form method="post">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">電話</label>
                <input class="form-control" name="phone_number" value="{{ customer.phone_number if customer else '' }}" required {% if customer %}readonly{% endif %} placeholder="例如 0908123456">
                <div class="form-text">jewerly.db 限制電話必須是 10 碼數字。</div>
            </div>
            <div class="col-md-4">
                <label class="form-label">姓名</label>
                <input class="form-control" name="name" value="{{ customer.name if customer else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">性別</label>
                <select class="form-select" name="gender">
                    {% set g = customer.gender if customer else "" %}
                    <option value="">請選擇</option>
                    <option value="女" {% if g == "女" %}selected{% endif %}>女</option>
                    <option value="男" {% if g == "男" %}selected{% endif %}>男</option>
                    <option value="其他" {% if g == "其他" %}selected{% endif %}>其他</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">年齡</label>
                <input class="form-control" type="number" name="age" value="{{ customer.age if customer else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">平台</label>
                <input class="form-control" name="platform" value="{{ customer.platform if customer else '' }}">
            </div>
            <div class="col-md-4">
                <label class="form-label">地區</label>
                <input class="form-control" name="area" value="{{ customer.area if customer else '' }}">
            </div>
        </div>

        <div class="mt-4">
            <button class="btn btn-success">儲存</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('customers') }}">返回</a>
        </div>
    </form>
</div>

{% endblock %}
